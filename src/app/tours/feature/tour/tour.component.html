@if (tour(); as tour) {
  <app-tour-details
    [tour]="tour"
    [user]="(user$ | async)!"
    [isLoggedIn]="(isLoggedIn$ | async)!"
    [isProccessingPayment]="isProccessingPayment()"
    (tourBooked)="bookTour($event)"
    [isTourBooked]="isBooked()"
    [userReview]="userReview()!"
    [isTourCompleted]="isTourCompleted()"
    [startDate]="startDate()!"
  />
}
