<div class="confirm-modal">
  <h3 class="text-center mb-3">{{ data.title }}</h3>
  <p class="mb-5 text-center" [innerHTML]="data.message"></p>
  @if (error()) {
    <app-error-message [message]="error()!" />
  }
  <div class="d-flex justify-content-evenly">
    <button class="btn btn--gray btn--small" [disabled]="isLoading()" (click)="onCancel()">
      {{ cancelText }}
    </button>
    <button
      class="btn btn--small"
      [class]="confirmBtnClass"
      [disabled]="isLoading()"
      (click)="onConfirm()"
    >
      @if (isLoading()) {
        <div class="spinner-border" role="status">
          <span class="sr-only">Loading...</span>
        </div>
      } @else {
        {{ confirmText }}
      }
    </button>
  </div>
</div>
