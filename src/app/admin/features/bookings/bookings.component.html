<div class="bookings">
    @if (isLoading()) {
        <app-loader />
    } @else {
        <app-page-header title="Bookings" />
        <app-common-table [columns]="columns()" [data]="bookings()"></app-common-table>
        <ng-template #paidTemplate let-booking>
            <div class="paid-status">
                {{ booking.paid ? '✅' : '⏳' }}
            </div>
          </ng-template>
        <ng-template #actionsTemplate let-booking>
            <div class="bookings__actions">
                <button (click)="editBooking(booking)">
                    <svg class="edit-icon"><use href="/assets/images/icons.svg#icon-edit"></use></svg>
                </button>
                <button (click)="deleteBooking(booking)">
                    <svg class="remove-icon"><use href="/assets/images/icons.svg#icon-trash-2"></use></svg>
                </button>
            </div>
        </ng-template>
    }
</div>
